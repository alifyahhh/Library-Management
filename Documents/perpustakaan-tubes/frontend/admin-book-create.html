<!doctype html>
<html>
<head><meta charset="utf-8"><title>Create Book</title></head>
<body>
  <h2>Create Book</h2>
  <p><a href="admin-books.html">Back</a></p>
  <p id="msg"></p>

  <label>Category</label>
  <select id="category"></select><br><br>

  <input id="title" placeholder="title"><br>
  <input id="author" placeholder="author"><br>
  <input id="isbn" placeholder="isbn"><br>
  <input id="stock" placeholder="stock (number)" type="number"><br>
  <button id="createBtn">Create</button>

  <script type="module">
    import { apiFetch } from "./js/api.js";

    async function loadCategories() {
      const res = await apiFetch("/api/categories");
      const sel = document.getElementById("category");
      sel.innerHTML = "";
      res.data.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    }

    document.getElementById("createBtn").onclick = async () => {
      try {
        const category_id = Number(document.getElementById("category").value);
        const title = document.getElementById("title").value.trim();
        const author = document.getElementById("author").value.trim();
        const isbn = document.getElementById("isbn").value.trim();
        const stock = Number(document.getElementById("stock").value);

        // validasi frontend
        if (!title) throw new Error("Title is required");
        if (Number.isNaN(stock) || stock < 0) throw new Error("Stock must be >= 0");

        await apiFetch("/api/books", {
          method: "POST",
          body: { category_id, title, author, isbn, stock }
        });
        document.getElementById("msg").textContent = "Created";
        location.href = "admin-books.html";
      } catch (e) {
        document.getElementById("msg").textContent = e.message;
      }
    };

    loadCategories().catch(() => location.href="login.html");
  </script>
</body>
</html>
