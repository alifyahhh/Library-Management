<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Digital Library - Dashboard</title>
</head>
<body>
  <h2>Dashboard</h2>
  <p id="who"></p>

  <ul>
    <li><a href="books.html">Books (Search + Borrow)</a></li>
    <li><a href="borrowings.html">My Borrowings (Return + Fine)</a></li>
    <li><a href="categories.html">Categories (CRUD)</a></li>
    <li><a href="admin-books.html">Admin Books (CRUD)</a></li>
    <li><a href="graphql.html">GraphQL Demo</a></li>
  </ul>

  <button id="logoutBtn">Logout</button>
  <p id="msg"></p>

  <script type="module">
    import { apiFetch } from "./js/api.js";
    import { logout } from "./js/auth.js";

    async function loadMe() {
      try {
        const me = await apiFetch("/api/auth/me");
        document.getElementById("who").textContent =
          `Login as: ${me.data.name} (${me.data.email}) role=${me.data.role}`;
      } catch (e) {
        location.href = "login.html";
      }
    }

    document.getElementById("logoutBtn").onclick = async () => {
      try {
        await logout();
        document.getElementById("msg").textContent = "Logged out";
        location.href = "login.html";
      } catch (e) {
        document.getElementById("msg").textContent = e.message;
      }
    };

    loadMe();
  </script>
</body>
</html>
